<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeInsight — Профиль сотрудника</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            position: relative;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
        }
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn:hover { background-color: #c82333; }
        .employee-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #667eea;
        }
        .employee-name { font-size: 28px; color: #333; }
        .employee-position { font-size: 18px; color: #666; margin-top: 5px; }
        .employee-details { margin-top: 5px; color: #888; }
        .grade-badge {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 24px;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .metric-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .metric-label {
            color: #666;
            margin-top: 8px;
        }
        .chart-container {
            max-width: 400px;
            margin: 20px auto;
        }
        .history-container {
            margin: 30px 0;
        }
        .history-container canvas {
            max-height: 250px;
        }
        .recommendations, .ipr {
            background: #e8f4fd;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
        }
        .recommendations h3, .ipr h3 { margin-bottom: 15px; color: #2c3e50; }
        .recommendations ul, .ipr ul { margin-left: 20px; }
        .recommendations li, .ipr li { margin: 8px 0; }
        .profile-actions {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .profile-actions h3 { margin: 15px 0 10px; }
        .profile-actions input, .profile-actions button {
            margin: 5px 0;
            padding: 8px;
        }
        .metrics-edit {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
        }
        .metrics-edit input {
            width: 100px;
            margin: 0 10px;
        }
        .btn {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover { background-color: #5a67d8; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .ipr-step {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .ipr-step input {
            margin-top: 3px;
        }
        .ipr-step .step-done {
            text-decoration: line-through;
            color: #888;
        }
        .ipr-step .step-due {
            font-size: 0.85em;
            color: #666;
            margin-left: 8px;
        }
        .actions-container {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            margin-top: 20px;
        }
        .actions-list ul {
            margin: 0;
            padding-left: 20px;
        }
        .actions-list li {
            margin-bottom: 8px;
            font-size: 0.9em;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 6px;
        }
        .actions-list li:last-child {
            border-bottom: none;
        }
        .actions-list .positive {
            color: #28a745;
            font-weight: bold;
        }
        .actions-list .negative {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="logoutBtn" class="logout-btn">Выйти</button>
        <div id="backLinkContainer">
            <a href="standalone.html" class="back-link">← Назад к дашборду</a>
        </div>
        <div id="employeeContent">
            <p>Загрузка данных...</p>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_URL = '';
        const urlParams = new URLSearchParams(window.location.search);
        const empId = urlParams.get('id');
        const STORAGE_KEY = `ipr_${empId}`;

        let currentIprSteps = [];

        function getToken() {
            return localStorage.getItem('token');
        }

        async function fetchWithAuth(url, options = {}) {
            const token = getToken();
            if (!token) {
                window.location.href = 'standalone.html';
                throw new Error('No token');
            }
            const headers = {
                ...options.headers,
                'Authorization': `Bearer ${token}`
            };
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('role');
                localStorage.removeItem('employee_id');
                window.location.href = 'standalone.html';
                throw new Error('Unauthorized');
            }
            return response;
        }

        if (!getToken()) {
            window.location.href = 'standalone.html';
        }

        const role = localStorage.getItem('role');
        if (role === 'employee') {
            const backLinkContainer = document.getElementById('backLinkContainer');
            if (backLinkContainer) backLinkContainer.style.display = 'none';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('employee_id');
            window.location.href = 'standalone.html';
        });

        function showToast(message, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, duration);
        }

        function saveIprSteps(steps) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(steps));
        }

        function loadIprSteps() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                currentIprSteps = JSON.parse(saved);
            } else {
                currentIprSteps = [];
            }
        }

        async function loadEmployee() {
            try {
                const response = await fetchWithAuth(`${API_URL}/employees/${empId}`);
                if (!response.ok) throw new Error('Сотрудник не найден');
                const data = await response.json();
                const gapRes = await fetchWithAuth(`${API_URL}/employees/${empId}/gap_analysis`);
                const gapData = await gapRes.json();
                renderEmployee(data, gapData);
            } catch (error) {
                document.getElementById('employeeContent').innerHTML = `<p style="color:red;">Ошибка: ${error.message}</p>`;
            }
        }

        async function loadHistory() {
            try {
                const res = await fetchWithAuth(`${API_URL}/employees/${empId}/history`);
                if (!res.ok) return;
                const history = await res.json();
                if (!history.length) return;

                const dates = history.map(h => new Date(h.date).toLocaleDateString());
                const scores = history.map(h => h.total_score);

                const ctx = document.getElementById('historyChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [{
                            label: 'Итоговый балл',
                            data: scores,
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.1,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: {
                            y: { min: 0, max: 1, title: { display: true, text: 'Балл' } },
                            x: { title: { display: true, text: 'Дата' } }
                        }
                    }
                });
            } catch (error) {
                console.error('Ошибка загрузки истории:', error);
            }
        }

        async function loadActions() {
            try {
                const res = await fetchWithAuth(`${API_URL}/employees/${empId}/actions`);
                if (!res.ok) return;
                const actions = await res.json();
                if (!actions.length) {
                    document.getElementById('actionsList').innerHTML = '<p>Пока нет записей. Загрузите код или обновите метрики.</p>';
                    return;
                }
                let html = '<ul>';
                for (const a of actions) {
                    const date = new Date(a.timestamp).toLocaleString();
                    const deltaClass = a.delta_score >= 0 ? 'positive' : 'negative';
                    const deltaSign = a.delta_score >= 0 ? '+' : '';
                    html += `
                        <li>
                            <strong>${date}</strong><br>
                            ${a.details}<br>
                            <span class="${deltaClass}">Изменение балла: ${deltaSign}${a.delta_score}</span>
                            (новый балл: ${a.new_score})
                        </li>
                    `;
                }
                html += '</ul>';
                document.getElementById('actionsList').innerHTML = html;
            } catch (err) {
                console.error('Ошибка загрузки истории изменений:', err);
            }
        }

        function generateIprSteps(empData, gaps, nextGrade) {
            const steps = [];
            const role = empData.position;

            for (const gap of gaps) {
                if (gap.status === 'need_improvement' && gap.gap > 0.1) {
                    let step = '';
                    if (gap.competency === 'tasks') {
                        step = `Увеличить количество задач до ${Math.ceil(gap.target * 100)}% от нормы. Рекомендуется брать дополнительные задачи и участвовать в кросс-функциональных проектах.`;
                    } else if (gap.competency === 'deadlines') {
                        step = `Повысить соблюдение дедлайнов до ${Math.ceil(gap.target * 100)}%. Использовать тайм-трекинг, разбивать задачи на подзадачи, внедрить практику ежедневных стендапов.`;
                    } else if (gap.competency === 'code_quality') {
                        step = `Улучшить качество кода до ${Math.ceil(gap.target * 100)}%. Пройти курс по рефакторингу, участвовать в код-ревью, писать больше юнит-тестов.`;
                    } else if (gap.competency === 'communication') {
                        step = `Развить коммуникативные навыки до ${Math.ceil(gap.target * 100)}%. Участвовать в командных обсуждениях, выступать на митапах, прочитать книгу "Как разговаривать с людьми".`;
                    }
                    if (step) {
                        steps.push({
                            title: step,
                            due: `3 месяца`,
                            completed: false
                        });
                    }
                }
            }

            if (nextGrade && empData.grade_result.grade !== nextGrade) {
                steps.push({
                    title: `Подготовка к переходу на уровень ${nextGrade}. Составить план развития, найти наставника, запросить обратную связь от руководителя.`,
                    due: `6 месяцев`,
                    completed: false
                });
            }

            if (role === 'Разработчик') {
                steps.push({
                    title: 'Освоить новый фреймворк/библиотеку (например, FastAPI, React) и применить в рабочем проекте.',
                    due: '3 месяца',
                    completed: false
                });
                steps.push({
                    title: 'Провести технический доклад для команды (внутренний митап).',
                    due: '4 месяца',
                    completed: false
                });
            } else if (role === 'Аналитик') {
                steps.push({
                    title: 'Пройти курс по продвинутому SQL и BI-инструментам (Power BI, Tableau).',
                    due: '3 месяца',
                    completed: false
                });
                steps.push({
                    title: 'Написать статью на внутренний блог о методах сбора требований.',
                    due: '5 месяцев',
                    completed: false
                });
            } else if (role === 'Team Lead') {
                steps.push({
                    title: 'Пройти курс по управлению проектами (Scrum Master) и получить сертификат.',
                    due: '4 месяца',
                    completed: false
                });
                steps.push({
                    title: 'Провести ретроспективу команды и внедрить улучшения процессов.',
                    due: '2 месяца',
                    completed: false
                });
            }

            if (steps.length === 0) {
                steps.push({
                    title: 'Отличные результаты! Рекомендуется поддерживать текущий уровень и делиться опытом с коллегами.',
                    due: 'постоянно',
                    completed: false
                });
            }

            return steps;
        }

        function renderIpr(steps) {
            if (!steps.length) {
                document.getElementById('iprList').innerHTML = '<li>План развития будет сформирован после анализа данных.</li>';
                return;
            }
            let html = '';
            steps.forEach((step, idx) => {
                const completedClass = step.completed ? 'step-done' : '';
                html += `
                    <div class="ipr-step">
                        <input type="checkbox" data-idx="${idx}" ${step.completed ? 'checked' : ''}>
                        <span class="${completedClass}">${step.title} <span class="step-due">(срок: ${step.due})</span></span>
                    </div>
                `;
            });
            document.getElementById('iprList').innerHTML = html;

            document.querySelectorAll('.ipr-step input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    if (!isNaN(idx) && currentIprSteps[idx]) {
                        currentIprSteps[idx].completed = e.target.checked;
                        saveIprSteps(currentIprSteps);
                        renderIpr(currentIprSteps);
                    }
                });
            });
        }

        function renderEmployee(data, gapData) {
            const emp = data;
            const metrics = emp.metrics;
            const gradeResult = emp.grade_result;
            const normalized = gradeResult.normalized_metrics;

            let nextGrade = '';
            if (gradeResult.grade === 'Junior') nextGrade = 'Middle';
            else if (gradeResult.grade === 'Middle') nextGrade = 'Senior';
            else nextGrade = 'Senior+';

            const gaps = gapData.gaps || [];
            const iprSteps = generateIprSteps(emp, gaps, nextGrade);
            loadIprSteps();
            if (currentIprSteps.length === iprSteps.length) {
                for (let i = 0; i < iprSteps.length; i++) {
                    if (currentIprSteps[i]) iprSteps[i].completed = currentIprSteps[i].completed;
                }
            }
            currentIprSteps = iprSteps;
            saveIprSteps(currentIprSteps);

            const competencies = {
                'Задачи': normalized.tasks,
                'Дедлайны': normalized.deadlines,
                'Качество кода': normalized.code_quality,
                'Коммуникации': normalized.communication
            };

            const html = `
                <div class="employee-header">
                    <div>
                        <div class="employee-name">${emp.name}</div>
                        <div class="employee-position">${emp.position}</div>
                        <div class="employee-details">Стаж: ${emp.experience || 0} лет</div>
                    </div>
                    <div class="grade-badge">${gradeResult.grade} (${gradeResult.total_score})</div>
                </div>
                
                <div class="metrics-edit">
                    <h3>📊 Редактирование метрик</h3>
                    <label>Задач выполнено: 
                        <input type="number" id="tasksInput" value="${metrics.tasks_completed}">
                    </label>
                    <label>Соблюдение дедлайнов (%): 
                        <input type="number" id="deadlinesInput" step="1" min="0" max="100" value="${metrics.deadlines_met}">
                    </label>
                    <button id="updateMetricsBtn" class="btn">Обновить метрики</button>
                </div>
                
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value">${metrics.tasks_completed}</div>
                        <div class="metric-label">Задач выполнено</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${metrics.deadlines_met}%</div>
                        <div class="metric-label">Соблюдение дедлайнов</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${metrics.code_quality_score}</div>
                        <div class="metric-label">Качество кода</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${metrics.communication_score}</div>
                        <div class="metric-label">Коммуникации</div>
                    </div>
                </div>
                
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>

                <div class="history-container">
                    <h3>📈 Динамика баллов</h3>
                    <canvas id="historyChart" width="400" height="200"></canvas>
                </div>
                
                <div class="actions-container">
                    <h3>📝 История изменений</h3>
                    <div id="actionsList" class="actions-list"></div>
                </div>
                <div class="recommendations">
                    <h3>📈 Рекомендации по развитию</h3>
                    <ul id="recommendationsList"></ul>
                </div>

                <div class="ipr">
                    <h3>📋 Индивидуальный план развития (ИПР)</h3>
                    <div id="iprList"></div>
                    <div style="margin-top: 15px;">
                        <button id="resetIprBtn" class="btn">Сбросить прогресс ИПР</button>
                    </div>
                </div>
                
                <div class="profile-actions">
                    <h3>📄 Анализ кода</h3>
                    <input type="file" id="codeFile" accept=".py,.txt">
                    <button id="uploadCodeBtn" class="btn">Загрузить и проанализировать</button>
                    
                    <h3>💬 Анализ комментариев</h3>
                    <input type="file" id="commentsFile" accept=".txt">
                    <button id="uploadCommentsBtn" class="btn">Загрузить и проанализировать</button>
                </div>
            `;

            document.getElementById('employeeContent').innerHTML = html;

            const radarCtx = document.getElementById('radarChart').getContext('2d');
            new Chart(radarCtx, {
                type: 'radar',
                data: {
                    labels: Object.keys(competencies),
                    datasets: [{
                        label: 'Уровень компетенции',
                        data: Object.values(competencies),
                        backgroundColor: 'rgba(102, 126, 234, 0.2)',
                        borderColor: '#667eea',
                        borderWidth: 2,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointRadius: 5
                    }]
                },
                options: {
                    scales: { r: { beginAtZero: true, max: 1, ticks: { stepSize: 0.2 } } },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (context) => `${context.label}: ${(context.raw * 100).toFixed(0)}%`
                            }
                        }
                    }
                }
            });

            const recommendations = [];
            if (normalized.tasks < 0.5) recommendations.push('Увеличить количество выполняемых задач');
            if (normalized.deadlines < 0.6) recommendations.push('Улучшить соблюдение сроков (использовать тайм-менеджмент)');
            if (normalized.code_quality < 0.6) recommendations.push('Повысить качество кода: пройти курсы по рефакторингу и паттернам');
            if (normalized.communication < 0.6) recommendations.push('Развить коммуникативные навыки: участие в командных обсуждениях');
            if (recommendations.length === 0) recommendations.push('Отличная работа! Рекомендуется рассмотреть повышение грейда');
            document.getElementById('recommendationsList').innerHTML = recommendations.map(r => `<li>${r}</li>`).join('');

            renderIpr(currentIprSteps);
            loadHistory();
            loadActions();

            document.getElementById('updateMetricsBtn').addEventListener('click', async () => {
                const tasks = parseInt(document.getElementById('tasksInput').value, 10) || 0;
                const deadlines = parseFloat(document.getElementById('deadlinesInput').value) || 0;
                try {
                    const res = await fetchWithAuth(`${API_URL}/employees/${empId}/metrics?tasks_completed=${tasks}&deadlines_met=${deadlines}`, {
                        method: 'PUT'
                    });
                    if (res.ok) {
                        showToast('Метрики обновлены');
                        loadEmployee();
                    } else {
                        showToast('Ошибка обновления');
                    }
                } catch (err) {
                    showToast('Ошибка: ' + err.message);
                }
            });

            document.getElementById('uploadCodeBtn').addEventListener('click', async () => {
                const file = document.getElementById('codeFile').files[0];
                if (!file) return showToast('Выберите файл с кодом');
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const res = await fetchWithAuth(`${API_URL}/upload/code/${empId}`, {
                        method: 'POST',
                        body: formData
                    });
                    if (res.ok) {
                        const result = await res.json();
                        showToast(`Качество кода: ${result.code_quality_score}`);
                        loadEmployee();
                    } else {
                        showToast('Ошибка загрузки');
                    }
                } catch (err) {
                    showToast('Ошибка: ' + err.message);
                }
            });

            document.getElementById('uploadCommentsBtn').addEventListener('click', async () => {
                const file = document.getElementById('commentsFile').files[0];
                if (!file) return showToast('Выберите файл с комментариями');
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const res = await fetchWithAuth(`${API_URL}/upload/comments/${empId}`, {
                        method: 'POST',
                        body: formData
                    });
                    if (res.ok) {
                        const result = await res.json();
                        showToast(`Оценка коммуникаций: ${result.communication_score}`);
                        loadEmployee();
                    } else {
                        showToast('Ошибка загрузки');
                    }
                } catch (err) {
                    showToast('Ошибка: ' + err.message);
                }
            });

            document.getElementById('resetIprBtn').addEventListener('click', () => {
                localStorage.removeItem(STORAGE_KEY);
                loadEmployee();
                showToast('Прогресс ИПР сброшен');
            });
        }

        if (empId) {
            loadEmployee();
        } else {
            document.getElementById('employeeContent').innerHTML = '<p style="color:red;">Ошибка: не указан ID сотрудника</p>';
        }
    </script>
</body>
</html>
